[tox]
envlist = py{310,311,312,313}-lint, py{310,311,312,313}-mypy, py{310,311,312,313}-unit
source_dir = src/galaxy_workflow_dev_webapp
test_dir = tests

[gh-actions]
python =
    3.10: py310-unit, py310-mypy, py310-lint
    3.11: py311-unit, py311-mypy
    3.12: py312-unit, py312-mypy
    3.13: py313-unit, py313-mypy, py313-lint

[testenv]
commands =
    lint: ruff check {posargs}
    lint: black --check --diff .
    mypy: mypy src/galaxy_workflow_dev_webapp
    unit: pytest {posargs}
deps =
    lint: black
    lint: ruff
    mypy: mypy
    mypy: types-PyYAML
    mypy: types-requests
    unit: pytest>=8.0
    unit: pytest-asyncio>=0.24
    unit: httpx>=0.27
skip_install =
    lint: True
