name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      galaxy_ref:
        description: "Galaxy branch/ref to build subpackages from"
        default: wf_tool_state
      gxformat2_ref:
        description: "gxformat2 branch/ref to build from"
        default: abstraction_applications

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Galaxy branch
        uses: actions/checkout@v4
        with:
          repository: jmchilton/galaxy
          ref: ${{ inputs.galaxy_ref || 'wf_tool_state' }}
          path: _galaxy
          sparse-checkout: |
            packages/util
            packages/tool_util_models
            packages/tool_util

      - name: Checkout gxformat2 branch
        uses: actions/checkout@v4
        with:
          repository: galaxyproject/gxformat2
          ref: ${{ inputs.gxformat2_ref || 'abstraction_applications' }}
          path: _gxformat2

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build dependency wheels
        run: |
          for pkg in util tool_util_models tool_util; do
            uv build _galaxy/packages/$pkg --out-dir wheels
          done
          uv build _gxformat2 --out-dir wheels

      - name: Install project
        run: |
          rm uv.lock
          uv sync --no-sources --find-links wheels --group test --group lint --group mypy

      - name: Lint
        if: matrix.python-version == '3.13'
        run: |
          uv run --no-sync isort --check --diff .
          uv run --no-sync ruff check
          uv run --no-sync black --check --diff .

      - name: Type check
        if: matrix.python-version == '3.13'
        run: uv run --no-sync mypy src/gxwf_web

      - name: Test
        run: uv run --no-sync pytest tests/ -v

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Galaxy branch
        uses: actions/checkout@v4
        with:
          repository: jmchilton/galaxy
          ref: ${{ inputs.galaxy_ref || 'wf_tool_state' }}
          path: _galaxy
          sparse-checkout: |
            packages/util
            packages/tool_util_models
            packages/tool_util

      - name: Checkout gxformat2 branch
        uses: actions/checkout@v4
        with:
          repository: galaxyproject/gxformat2
          ref: ${{ inputs.gxformat2_ref || 'abstraction_applications' }}
          path: _gxformat2

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build dependency wheels
        run: |
          for pkg in util tool_util_models tool_util; do
            uv build _galaxy/packages/$pkg --out-dir wheels
          done
          uv build _gxformat2 --out-dir wheels

      - name: Install project
        run: |
          rm uv.lock
          uv sync --no-sources --find-links wheels --group docs

      - name: Build docs
        run: |
          uv run --no-sync sphinx-apidoc -f -o docs/ src/gxwf_web
          uv run --no-sync sphinx-build -b html docs/ docs/_build/html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.repository == 'jmchilton/gxwf-web'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/_build/html
